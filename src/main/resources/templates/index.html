<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Employee Web Service</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<main class="page">
    <section class="header">
        <div>
            <p class="eyebrow">CSW Practical Test</p>
            <h1>Employee Web Service</h1>
        </div>
        <div class="api-box">
            <span>REST API</span>
            <code>/api/employees/getEmployees</code>
        </div>
    </section>

    <section th:if="${successMessage}" class="notice success" th:text="${successMessage}"></section>
    <section th:if="${errorMessage}" class="notice error" th:text="${errorMessage}"></section>

    <section class="content-grid">
        <div class="panel table-panel">
            <div class="panel-heading">
                <h2>Employee List</h2>
                <span th:text="${#lists.size(employees)} + ' records'">0 records</span>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Salary</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="employee : ${employees}">
                        <td th:text="${employee.id}">1</td>
                        <td th:text="${employee.name}">Employee Name</td>
                        <td th:text="${#numbers.formatDecimal(employee.salary, 1, 2)}">1200.00</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(employees)}">
                        <td colspan="3" class="empty">No employees found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="forms">
            <form class="panel" th:action="@{/employees/add}" th:object="${newEmployee}" method="post">
                <h2>Add Employee</h2>
                <label>
                    <span>Name</span>
                    <input type="text" th:field="*{name}" placeholder="Employee name" required>
                    <small th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></small>
                </label>
                <label>
                    <span>Salary</span>
                    <input type="number" min="0.01" step="0.01" th:field="*{salary}" placeholder="1200.00" required>
                    <small th:if="${#fields.hasErrors('salary')}" th:errors="*{salary}"></small>
                </label>
                <button type="submit">Add Employee</button>
            </form>

            <form class="panel" th:action="@{/employees/update}" th:object="${updateEmployee}" method="post">
                <h2>Update Employee</h2>
                <label>
                    <span>ID</span>
                    <input type="number" min="1" th:field="*{id}" placeholder="Employee ID" required>
                    <small th:if="${#fields.hasErrors('id')}" th:errors="*{id}"></small>
                </label>
                <label>
                    <span>Name</span>
                    <input type="text" th:field="*{name}" placeholder="Updated name" required>
                    <small th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></small>
                </label>
                <label>
                    <span>Salary</span>
                    <input type="number" min="0.01" step="0.01" th:field="*{salary}" placeholder="1500.00" required>
                    <small th:if="${#fields.hasErrors('salary')}" th:errors="*{salary}"></small>
                </label>
                <button type="submit">Update Employee</button>
            </form>
        </div>
    </section>
</main>
</body>
</html>
